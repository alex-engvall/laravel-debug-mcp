name: Prepare release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version bump to prepare
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
          - custom
      custom_version:
        description: Custom semver version, required when release_type is custom
        required: false
        type: string
      prerelease_identifier:
        description: Identifier used for prerelease bumps
        required: false
        default: rc
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: prepare-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare version bump
    runs-on: ubuntu-latest

    steps:
      - name: Check out default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare package version
        id: version
        run: node scripts/release/prepare-version.mjs
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
          CUSTOM_VERSION: ${{ inputs.custom_version }}
          PRERELEASE_IDENTIFIER: ${{ inputs.prerelease_identifier }}

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Check formatting-sensitive diff
        run: git diff --check

      - name: Create release pull request
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          IS_PRERELEASE: ${{ steps.version.outputs.is_prerelease }}
        run: |
          set -euo pipefail

          branch="release/${RELEASE_TAG}"
          if git ls-remote --exit-code --heads origin "${branch}" >/dev/null 2>&1; then
            echo "::error::Branch ${branch} already exists. Close or update the existing release PR before preparing it again."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${branch}"
          git add package.json package-lock.json
          git commit -m "Release ${RELEASE_TAG}"
          git push --set-upstream origin "${branch}"

          cat > /tmp/release-pr-body.md <<EOF_BODY
          ## Release checklist

          - Version: \`${RELEASE_VERSION}\`
          - Tag to create after merge: \`${RELEASE_TAG}\`
          - GitHub prerelease: \`${IS_PRERELEASE}\`

          After this PR is merged, create and publish a GitHub Release using tag \`${RELEASE_TAG}\`. The npm publish workflow validates that the tag, package version, lockfile, and prerelease flag match before publishing.
          EOF_BODY

          gh pr create \
            --base "${{ github.event.repository.default_branch }}" \
            --head "${branch}" \
            --title "Release ${RELEASE_TAG}" \
            --body-file /tmp/release-pr-body.md
