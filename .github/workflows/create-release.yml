name: Create GitHub release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release from the default branch, with or without the leading v
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: create-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest

    steps:
      - name: Check out default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve release metadata
        id: release
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          version="${INPUT_VERSION#v}"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version must use semver format X.Y.Z or X.Y.Z-prerelease."
            exit 1
          fi

          tag="v${version}"
          prerelease="false"
          if [[ "${version}" == *-* ]]; then
            prerelease="true"
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "is_prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

      - name: Validate release version
        run: node scripts/release/validate-release.mjs
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          GITHUB_RELEASE_PRERELEASE: ${{ steps.release.outputs.is_prerelease }}
          SKIP_NPM_VERSION_CHECK: "1"

      - name: Verify tag is new
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail

          if git rev-parse --verify --quiet "refs/tags/${RELEASE_TAG}"; then
            echo "::error::Tag ${RELEASE_TAG} already exists."
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Pack package
        run: npm pack --dry-run

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          IS_PRERELEASE: ${{ steps.release.outputs.is_prerelease }}
        run: |
          set -euo pipefail

          git tag "${RELEASE_TAG}"
          git push origin "${RELEASE_TAG}"

          args=("${RELEASE_TAG}" --title "${RELEASE_TAG}" --generate-notes)
          if [[ "${IS_PRERELEASE}" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"
