name: Publish npm package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release metadata
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
        run: npm run release:verify -- --tag "$RELEASE_TAG" --release-prerelease "$RELEASE_PRERELEASE"

      - name: Typecheck
        run: npm run typecheck

      - name: Check package contents
        run: npm pack --dry-run

      - name: Select npm dist-tag
        env:
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          if [ "$RELEASE_PRERELEASE" = "true" ]; then
            echo "NPM_DIST_TAG=next" >> "$GITHUB_ENV"
          else
            echo "NPM_DIST_TAG=latest" >> "$GITHUB_ENV"
          fi

      - name: Publish package
        run: npm publish --access public --provenance --tag "$NPM_DIST_TAG"
