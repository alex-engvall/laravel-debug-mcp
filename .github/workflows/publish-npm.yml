name: Publish to npm

on:
  release:
    types: [published]

concurrency:
  group: publish-npm-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release version
        id: release
        run: node scripts/release/validate-release.mjs
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          GITHUB_RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Pack package
        run: npm pack --dry-run

      - name: Configure npm automation token
        if: env.NPM_TOKEN != ''
        run: printf "//registry.npmjs.org/:_authToken=%s\n" "${NPM_TOKEN}" > ~/.npmrc

      - name: Publish to npm
        run: npm publish --access public --provenance --tag "${NPM_DIST_TAG}"
        env:
          NPM_DIST_TAG: ${{ steps.release.outputs.dist_tag }}
